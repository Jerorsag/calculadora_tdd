# =================================================================
# Configuración de pytest — Calculadora TDD
# =================================================================
# Este archivo configura el comportamiento por defecto de pytest.
# Los paths pueden sobreescribirse desde CLI:
#   python -m pytest fase_1_red/tests/ -v
# =================================================================

[pytest]

# Directorio de tests por defecto (Fase REFACTOR = código final)
testpaths = fase_3_refactor/tests

# Convenciones de nomenclatura para autodescubrimiento de tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones globales aplicadas en cada ejecución:
#   -v           → salida detallada (verbose)
#   --tb=short   → traceback corto en fallos (no muestra toda la pila)
#   --no-header  → omite el encabezado de pytest para salida más limpia
addopts =
    -v
    --tb=short
    --no-header

# Marcadores personalizados (para futura clasificación de tests)
markers =
    unitario:   Tests unitarios básicos
    integracion: Tests de integración entre componentes
    lento:       Tests que tardan más de 1 segundo
